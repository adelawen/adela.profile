<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experience | HsinYu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-color: #007bff; --bg-light: #f8f9fa; }
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background-color: var(--bg-light); color: #333; }
        
        .navbar { background: rgba(255, 255, 255, 0.95); border-bottom: 1px solid #eee; backdrop-filter: blur(10px); }
        .exp-card { background: #fff; border-radius: 20px; padding: 40px; margin-bottom: 40px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .exp-company { color: var(--primary-color); font-weight: 800; font-size: 1.4rem; }

        /* --- 核心修正：強制所有照片容器大小一致 --- */
        .photo-slider {
            display: flex;
            overflow-x: auto;
            gap: 15px;
            padding: 10px 0 20px 0;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }

        .slider-item {
            flex: 0 0 300px !important; /* 強制寬度 300px */
            width: 300px !important;
            scroll-snap-align: start;
        }

        /* 強制照片比例為 3:2，且高度固定 */
        .slider-item img {
            width: 100% !important;
            height: 200px !important; /* 強制高度 200px */
            object-fit: cover !important; /* 核心：這會自動裁切多餘部分，不變形 */
            border-radius: 12px;
            border: 1px solid #eee;
        }

        .btn-wrapper { text-align: center; margin-top: 20px; }
        .btn-pdf { background: #f1f3f5; color: #495057; border-radius: 8px; padding: 10px 20px; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; }

        @media (max-width: 768px) {
            .slider-item { flex: 0 0 260px !important; width: 260px !important; }
            .slider-item img { height: 180px !important; }
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="index.html">HsinYu.</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="projects.html">Projects</a></li>
                    <li class="nav-item"><a class="nav-link active" href="experience.html">Experience</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5" style="max-width: 900px;">
        <h1 class="fw-bold mb-5 text-center">Work Experience</h1>

        <div class="exp-card">
            <div class="exp-company">Global Views Monthly (遠見雜誌)</div>
            <p class="exp-role">EMI Educational Assistant | 2025 - Present</p>
            
            <div class="photo-slider">
                <div class="slider-item"><img src="grouppic1.jpg"></div>
                <div class="slider-item"><img src="grouppic2.jpg"></div>
                <div class="slider-item"><img src="grouppic3.jpg"></div>
                <div class="slider-item"><img src="grouppic4.jpg"></div>
                <div class="slider-item"><img src="grouppic5.jpg"></div>
                <div class="slider-item"><img src="grouppic6.jpg"></div>
                <div class="slider-item"><img src="grouppic7.jpg"></div>
                <div class="slider-item"><img src="grouppic8.jpg"></div>
            </div>

            <div class="btn-wrapper">
                <a href="EMI%20educational%20assistant%20contract.pdf" target="_blank" class="btn-pdf">
                    <i class="fas fa-file-contract"></i> View Contract
                </a>
            </div>
        </div>

        <div class="exp-card">
            <div class="exp-company">AlphaRing International (聚界潔能)</div>
            <p class="exp-role">Administrative Operations Intern | 2024</p>

            <div class="photo-slider">
                <div class="slider-item">
                    <img src="Group%20photo%20at%20the%20laboratory%20closing%20ceremony.jpg" alt="AlphaRing Lab">
                </div>
            </div>

            <div class="btn-wrapper">
                <a href="Employment%20Agreement_Wen, Hsin-Yu_06142024.pdf" target="_blank" class="btn-pdf">
                    <i class="fas fa-file-pdf"></i> View Agreement
                </a>
            </div>
        </div>
    </div>
</body>
</html>
