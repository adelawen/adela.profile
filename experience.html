<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experience | HsinYu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #007bff; --bg: #f8f9fa; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #333; }
        
        /* 導覽列：與首頁完全一致 */
        .navbar { background: white; border-bottom: 1px solid #eee; padding: 15px 0; }
        .nav-link { font-weight: 500; color: #555 !important; }
        .nav-link.active { color: var(--primary) !important; font-weight: 700; }
        .btn-resume { border-radius: 50px; font-weight: 600; padding: 8px 22px; font-size: 0.9rem; }
        .lang-btn { border: none; background: none; font-weight: bold; color: var(--primary); padding: 5px; cursor: pointer; }
        .lang-active { text-decoration: underline; text-underline-offset: 4px; }

        /* 經歷卡片 */
        .exp-card { background: white; border-radius: 20px; padding: 35px; margin-bottom: 30px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); border: none; }
        
        /* 照片 Slider：強制照片大小一致 */
        .photo-slider { display: flex; overflow-x: auto; gap: 15px; padding-bottom: 15px; scroll-snap-type: x mandatory; }
        .slider-item { flex: 0 0 280px; scroll-snap-align: start; }
        .slider-item img { width: 100%; height: 180px; object-fit: cover; border-radius: 12px; border: 1px solid #eee; }
        
        .btn-pdf { background: #f1f3f5; color: #495057; border-radius: 8px; padding: 10px 20px; text-decoration: none; font-size: 0.9rem; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-pdf:hover { background: #e9ecef; color: black; }

        @media (max-width: 991px) {
            .navbar-nav { text-align: center; padding: 20px 0; }
            .nav-item { margin-bottom: 15px; }
            .slider-item { flex: 0 0 240px; }
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold text-primary" href="index.html">HsinYu.</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item"><a class="nav-link px-3" href="index.html" data-key="nav-home">Home</a></li>
                <li class="nav-item"><a class="nav-link px-3" href="projects.html" data-key="nav-projects">Projects</a></li>
                <li class="nav-item"><a class="nav-link px-3 active" href="experience.html" data-key="nav-exp">Experience</a></li>
                <li class="nav-item ms-lg-3 mt-3 mt-lg-0">
                    <a href="resume.pdf" download class="btn btn-primary btn-resume shadow-sm" data-key="btn-cv">Download CV</a>
                </li>
                <li class="nav-item ms-lg-3">
                    <div class="d-flex align-items-center gap-2">
                        <button id="btn-en" class="lang-btn" onclick="switchLang('en')">EN</button>
                        <span class="text-muted">|</span>
                        <button id="btn-zh" class="lang-btn" onclick="switchLang('zh')">中</button>
                    </div>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container my-5" style="max-width: 850px;">
    <h2 class="fw-bold mb-5 text-center" data-key="page-title">Work Experience</h2>

    <div class="exp-card">
        <h4 class="fw-bold text-primary mb-1">Global Views Monthly (遠見雜誌)</h4>
        <p class="text-muted mb-4" data-key="role-global">EMI Educational Assistant | 2025 - Present</p>
        <div class="photo-slider">
            <div class="slider-item"><img src="grouppic1.jpg"></div>
            <div class="slider-item"><img src="grouppic2.jpg"></div>
            <div class="slider-item"><img src="grouppic3.jpg"></div>
            <div class="slider-item"><img src="grouppic4.jpg"></div>
            <div class="slider-item"><img src="grouppic5.jpg"></div>
            <div class="slider-item"><img src="grouppic6.jpg"></div>
            <div class="slider-item"><img src="grouppic7.jpg"></div>
            <div class="slider-item"><img src="grouppic8.jpg"></div>
        </div>
        <div class="text-center mt-3">
            <a href="EMI%20educational%20assistant%20contract.pdf" target="_blank" class="btn-pdf">
                <i class="fas fa-file-contract"></i> <span data-key="btn-contract">View Contract</span>
            </a>
        </div>
    </div>

    <div class="exp-card">
        <h4 class="fw-bold text-primary mb-1">AlphaRing International (聚界潔能)</h4>
        <p class="text-muted mb-4" data-key="role-alpha">Administrative Operations Intern | 2024</p>
        <div class="photo-slider">
            <div class="slider-item">
                <img src="Group%20photo%20at%20the%20laboratory%20closing%20ceremony.jpg" alt="AlphaRing Lab">
            </div>
        </div>
        <div class="text-center mt-3">
            <a href="Employment%20Agreement_Wen, Hsin-Yu_06142024.pdf" target="_blank" class="btn-pdf">
                <i class="fas fa-file-pdf"></i> <span data-key="btn-agreement">View Agreement</span>
            </a>
        </div>
    </div>
</div>

<script>
    const langData = {
        en: { "nav-home": "Home", "nav-projects": "Projects", "nav-exp": "Experience", "btn-cv": "Download CV", "page-title": "Work Experience", "role-global": "EMI Educational Assistant | 2025 - Present", "role-alpha": "Operations Intern | 2024", "btn-contract": "View Contract", "btn-agreement": "View Agreement" },
        zh: { "nav-home": "首頁", "nav-projects": "作品集", "nav-exp": "實習經驗", "btn-cv": "下載履歷", "page-title": "專業實習經歷", "role-global": "EMI 教育助理 | 2025 - 至今", "role-alpha": "行政營運實習生 | 2024", "btn-contract": "查看合約", "btn-agreement": "查看協議" }
    };

    function applyLang(lang) {
        document.querySelectorAll('[data-key]').forEach(el => {
            const key = el.getAttribute('data-key');
            if (langData[lang][key]) el.innerText = langData[lang][key];
        });
        document.getElementById('btn-en').classList.toggle('lang-active', lang === 'en');
        document.getElementById('btn-zh').classList.toggle('lang-active', lang === 'zh');
    }

    function switchLang(lang) {
        localStorage.setItem('pref-lang', lang);
        applyLang(lang);
    }

    window.onload = () => {
        applyLang(localStorage.getItem('pref-lang') || 'en');
    };
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
