<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Experience | HsinYu Wen</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* 基礎樣式對齊首頁 */
:root{--ink:#0d1520;--ink-2:#172030;--ink-3:#1e2d42;--gold:#c8a45a;--gold-lt:#e8d4a0;--white:#fff;--muted:#8a96a8;--muted-2:#b0bac8;--border:rgba(200,164,90,.22);--border-w:rgba(255,255,255,.07);--radius:3px;--fd:'Cormorant Garamond',serif;--fb:'Outfit',sans-serif;--ease:cubic-bezier(.4,0,.2,1);--t:.32s var(--ease)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth}
body{font-family:var(--fb);background:var(--ink);color:var(--white);overflow-x:hidden;line-height:1.7}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 300 300' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.028'/%3E%3C/svg%3E");pointer-events:none;z-index:0}

/* 導航欄樣式 - 嚴格對齊首頁格式與大小 */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:20px 0;transition:var(--t);border-bottom:1px solid transparent}
.nav.scrolled{padding:13px 0;background:rgba(13,21,32,.96);backdrop-filter:blur(18px);border-color:var(--border)}
.nav-inner{max-width:1120px;margin:0 auto;padding:0 32px;display:flex;align-items:center;justify-content:space-between}
.nav-logo{font-family:var(--fd);font-size:1.4rem;font-weight:700;color:var(--white);text-decoration:none}.nav-logo span{color:var(--gold)}
.nav-links{display:flex;list-style:none;align-items:center}
.nav-links a{font-size:.72rem;font-weight:500;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);padding:7px 13px;transition:var(--t);text-decoration:none;position:relative}
.nav-links a:hover,.nav-links a.active{color:var(--white)}
.nav-links a.active::after{content:'';position:absolute;bottom:0;left:13px;right:13px;height:1px;background:var(--gold)}
.nav-right{display:flex;align-items:center;gap:15px}
.lang-btn{background:none;border:none;cursor:pointer;color:var(--muted);font-family:var(--fb);font-size:.72rem;font-weight:500;letter-spacing:.1em;transition:var(--t);padding:4px}
.lang-btn.active{color:var(--gold)}.lang-sep{color:rgba(200,164,90,.3);font-size:.6rem}
.nav-cv{font-size:.68rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;border:1px solid var(--gold);color:var(--gold);padding:6px 15px;border-radius:var(--radius);text-decoration:none;transition:var(--t)}
.nav-cv:hover{background:var(--gold);color:var(--ink)}

/* 內容區塊 */
.main{max-width:1120px;margin:160px auto 110px;padding:0 32px}
.proj-block{margin-bottom:80px}.proj-num{font-family:var(--fd);font-size:4.5rem;font-weight:700;color:rgba(200,164,90,.1);margin-bottom:-15px}
.card{background:var(--ink-2);border:1px solid var(--border-w);border-radius:6px;overflow:hidden}
.card-bar{height:3px}.bar-gold{background:var(--gold)}.bar-blue{background:#4a90d9}
.card-head{padding:32px 40px;border-bottom:1px solid var(--border-w);display:flex;justify-content:space-between;flex-wrap:wrap;gap:20px}
.card-title{font-family:var(--fd);font-size:1.85rem;font-weight:700}
.btn-dl{display:inline-flex;align-items:center;gap:8px;font-size:.68rem;padding:8px 15px;border:1px solid var(--border);color:var(--gold);text-decoration:none;transition:var(--t)}

/* 縮圖統一尺寸設定 */
.photo-area{margin-top:20px}
.photo-scroll{display:flex;gap:12px;overflow-x:auto;padding-bottom:15px}
.photo-scroll::-webkit-scrollbar{height:4px}.photo-scroll::-webkit-scrollbar-thumb{background:var(--gold)}
.thumb{flex:0 0 220px; /* 固定寬度，不論幾張照片都一樣大 */
       aspect-ratio:4/3;border-radius:4px;overflow:hidden;border:1px solid var(--border-w);cursor:pointer}
.thumb img{width:100%;height:100%;object-fit:cover;transition:var(--t)}
.thumb:hover img{transform:scale(1.05)}

/* 燈箱視窗 */
#lightbox{position:fixed;inset:0;background:rgba(13,21,32,.98);z-index:1000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(10px)}
#lightbox.active{display:flex}
.lb-content{position:relative;max-width:85vw;max-height:80vh}
.lb-img{max-width:100%;max-height:80vh;border-radius:4px;box-shadow:0 20px 50px rgba(0,0,0,.5)}
.lb-close{position:absolute;top:-50px;right:0;color:var(--white);font-size:2rem;cursor:pointer}
.lb-nav-btn{position:absolute;top:50%;transform:translateY(-50%);color:var(--white);font-size:2rem;cursor:pointer;background:rgba(255,255,255,.1);width:50px;height:50px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.lb-prev{left:-70px}.lb-next{right:-70px}

.reveal{opacity:0;transform:translateY(20px);transition:0.7s var(--ease)}.reveal.v{opacity:1;transform:none}
</style>
</head>
<body>

<nav class="nav" id="mainnav"><div class="nav-inner">
    <a href="index.html" class="nav-logo">HsinYu<span>.</span></a>
    <ul class="nav-links">
        <li><a href="index.html">HOME</a></li>
        <li><a href="projects.html">PROJECTS</a></li>
        <li><a href="competitions.html">COMPETITIONS</a></li>
        <li><a href="experience.html" class="active">INTERNSHIP</a></li>
    </ul>
    <div class="nav-right">
        <button class="lang-btn" id="btn-en" onclick="switchLang('en')">EN</button>
        <span class="lang-sep">·</span>
        <button class="lang-btn" id="btn-zh" onclick="switchLang('zh')">中</button>
        <a href="resume.pdf" download class="nav-cv">CV</a>
    </div>
</div></nav>

<main class="main">
    <div class="proj-block reveal">
        <div class="proj-num">01</div>
        <div class="card">
            <div class="card-bar bar-gold"></div>
            <div class="card-head">
                <div>
                    <h2 class="card-title" data-en="EMI Educational Assistant" data-zh="全英文夏令營帶班導師">EMI Educational Assistant</h2>
                    <p style="color:var(--muted); font-style:italic">Vision Creative Culture · Summer 2026</p>
                </div>
                <a class="btn-dl" href="EMI%20educational%20assistant%20contract.pdf" target="_blank" download><i class="fas fa-file-pdf"></i> AGREEMENT</a>
            </div>
            <div class="card-body" style="padding:40px">
                <div class="photo-area">
                    <p class="col-lbl" data-en="GALLERY" data-zh="實習紀錄">GALLERY</p>
                    <div class="photo-scroll">
                        <div class="thumb" onclick="openLightbox(0, 'vision')"><img src="grouppic1.jpg"></div>
                        <div class="thumb" onclick="openLightbox(1, 'vision')"><img src="grouppic2.jpg"></div>
                        <div class="thumb" onclick="openLightbox(2, 'vision')"><img src="grouppic3.jpg"></div>
                        <div class="thumb" onclick="openLightbox(3, 'vision')"><img src="grouppic4.jpg"></div>
                        <div class="thumb" onclick="openLightbox(4, 'vision')"><img src="grouppic5.jpg"></div>
                        <div class="thumb" onclick="openLightbox(5, 'vision')"><img src="grouppic6.jpg"></div>
                        <div class="thumb" onclick="openLightbox(6, 'vision')"><img src="grouppic7.jpg"></div>
                        <div class="thumb" onclick="openLightbox(7, 'vision')"><img src="grouppic8.jpg"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="proj-block reveal">
        <div class="proj-num">02</div>
        <div class="card">
            <div class="card-bar bar-blue"></div>
            <div class="card-head">
                <div>
                    <h2 class="card-title" data-en="Administrative Assistant" data-zh="行政助理實習">Administrative Assistant</h2>
                    <p style="color:var(--muted); font-style:italic">AlphaRing Fusion Energy · 2024</p>
                </div>
                <a class="btn-dl" href="Employment%20Agreement_Wen,%20Hsin-Yu_06142024.pdf" target="_blank" download><i class="fas fa-file-contract"></i> AGREEMENT</a>
            </div>
            <div class="card-body" style="padding:40px">
                <div class="photo-area">
                    <p class="col-lbl" data-en="TEAM PHOTO" data-zh="團隊合影">TEAM PHOTO</p>
                    <div class="photo-scroll">
                        <div class="thumb" onclick="openLightbox(0, 'fei')"><img src="Group%20photo%20at%20the%20laboratory%20closing%20ceremony.jpg"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<div id="lightbox">
    <span class="lb-close" onclick="closeLightbox()">&times;</span>
    <div class="lb-content">
        <div id="lb-prev" class="lb-nav-btn lb-prev" onclick="changeImg(-1)"><i class="fas fa-chevron-left"></i></div>
        <img src="" class="lb-img" id="lbImg">
        <div id="lb-next" class="lb-nav-btn lb-next" onclick="changeImg(1)"><i class="fas fa-chevron-right"></i></div>
    </div>
</div>

<script>
// 分組照片定義
const galleryGroups = {
    vision: ['grouppic1.jpg','grouppic2.jpg','grouppic3.jpg','grouppic4.jpg','grouppic5.jpg','grouppic6.jpg','grouppic7.jpg','grouppic8.jpg'],
    fei: ['Group%20photo%20at%20the%20laboratory%20closing%20ceremony.jpg']
};
let currentIdx = 0;
let currentGroup = '';

function openLightbox(idx, group) {
    currentIdx = idx;
    currentGroup = group;
    updateLightbox();
    document.getElementById('lightbox').classList.add('active');
    document.body.style.overflow = 'hidden';
}
function closeLightbox() {
    document.getElementById('lightbox').classList.remove('active');
    document.body.style.overflow = 'auto';
}
function changeImg(dir) {
    const list = galleryGroups[currentGroup];
    const nextIdx = currentIdx + dir;
    if (nextIdx >= 0 && nextIdx < list.length) {
        currentIdx = nextIdx;
        updateLightbox();
    }
}
function updateLightbox() {
    const list = galleryGroups[currentGroup];
    document.getElementById('lbImg').src = list[currentIdx].replace(/ /g, '%20');
    // 判斷按鈕顯示與否 (分組隔離，滑到底就不能再滑)
    document.getElementById('lb-prev').style.display = currentIdx === 0 ? 'none' : 'flex';
    document.getElementById('lb-next').style.display = currentIdx === list.length - 1 ? 'none' : 'flex';
}

function switchLang(l){
    localStorage.setItem('lang',l);
    document.getElementById('btn-en').classList.toggle('active',l==='en');
    document.getElementById('btn-zh').classList.toggle('active',l==='zh');
    document.querySelectorAll('[data-en]').forEach(el=>{ el.innerHTML = el.getAttribute('data-'+l); });
}

window.addEventListener('scroll',()=>{document.getElementById('mainnav').classList.toggle('scrolled',window.scrollY>40)});
const io=new IntersectionObserver(entries=>entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('v')}),{threshold:.08});
document.querySelectorAll('.reveal').forEach(el=>io.observe(el));
document.addEventListener('DOMContentLoaded',()=>switchLang(localStorage.getItem('lang')||'en'));
</script>
</body>
</html>
