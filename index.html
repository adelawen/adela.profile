<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HsinYu | Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #007bff; --bg: #f8f9fa; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: #333; }
        
        .navbar { background: white; border-bottom: 1px solid #eee; padding: 15px 0; }
        .nav-link { font-weight: 500; color: #555 !important; }
        .nav-link.active { color: var(--primary) !important; font-weight: 700; }
        .btn-resume { border-radius: 50px; font-weight: 600; padding: 8px 22px; font-size: 0.9rem; }

        .lang-btn { border: none; background: none; font-weight: bold; color: var(--primary); padding: 5px; cursor: pointer; }
        .lang-active { text-decoration: underline; text-underline-offset: 4px; }

        .hero-section { min-height: 85vh; display: flex; align-items: center; padding: 60px 0; }
        .profile-photo { width: 300px; height: 300px; object-fit: cover; border-radius: 50%; border: 6px solid #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }

        /* 社交按鈕樣式 */
        .social-links .btn { border-radius: 50px; font-weight: 600; padding: 10px 20px; transition: 0.3s; }
        .btn-email { background-color: #ea4335; color: white !important; border: none; }
        .btn-email:hover { background-color: #d33828; opacity: 0.9; }
        .btn-linkedin { background-color: #0077b5; color: white !important; border: none; }
        .btn-linkedin:hover { background-color: #005582; opacity: 0.9; }

        @media (max-width: 991px) {
            .navbar-nav { text-align: center; padding: 20px 0; }
            .nav-item { margin-bottom: 15px; }
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold text-primary" href="index.html">HsinYu.</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item"><a class="nav-link px-3 active" href="index.html" data-key="nav-home">Home</a></li>
                <li class="nav-item"><a class="nav-link px-3" href="projects.html" data-key="nav-projects">Projects</a></li>
                <li class="nav-item"><a class="nav-link px-3" href="experience.html" data-key="nav-exp">Experience</a></li>
                <li class="nav-item ms-lg-3 mt-3 mt-lg-0">
                    <a href="resume.pdf" download class="btn btn-primary btn-resume shadow-sm" data-key="btn-cv">Download CV</a>
                </li>
                <li class="nav-item ms-lg-3">
                    <div class="d-flex align-items-center gap-2">
                        <button id="btn-en" class="lang-btn" onclick="switchLang('en')">EN</button>
                        <span class="text-muted">|</span>
                        <button id="btn-zh" class="lang-btn" onclick="switchLang('zh')">中</button>
                    </div>
                </li>
            </ul>
        </div>
    </div>
</nav>

<header class="hero-section">
    <div class="container">
        <div class="row align-items-center text-center text-lg-start">
            <div class="col-lg-7">
                <h6 class="text-primary fw-bold text-uppercase mb-3" data-key="hero-tag">ITS & Logistics Management</h6>
                <h1 class="display-4 fw-bold mb-4">Hi, I'm <span class="text-primary">HsinYu</span></h1>
                <p class="lead text-secondary mb-4" data-key="hero-desc">Focusing on Intelligent Transportation Systems (ITS) and supply chain optimization.</p>
                
                <div class="social-links d-flex flex-wrap justify-content-center justify-content-lg-start gap-3">
                    <a href="projects.html" class="btn btn-dark shadow" data-key="btn-view-projects">Explore Projects</a>
                    
                    <a href="https://www.linkedin.com/in/adelawen/" target="_blank" class="btn btn-linkedin shadow">
                        <i class="fab fa-linkedin me-2"></i>LinkedIn
                    </a>
                    
                    <a href="mailto:h54121210@gs.ncku.edu.tw" class="btn btn-email shadow">
                        <i class="fas fa-envelope me-2"></i>Email
                    </a>
                </div>
            </div>
            <div class="col-lg-5 text-center mt-5 mt-lg-0">
                <img src="my-face.jpg" alt="Profile" class="profile-photo">
            </div>
        </div>
    </div>
</header>

<script>
    const langData = {
        en: { "nav-home": "Home", "nav-projects": "Projects", "nav-exp": "Experience", "btn-cv": "Download CV", "hero-tag": "ITS & Logistics Management", "hero-desc": "Focusing on Intelligent Transportation Systems (ITS) and supply chain optimization.", "btn-view-projects": "Explore Projects" },
        zh: { "nav-home": "首頁", "nav-projects": "作品集", "nav-exp": "實習經驗", "btn-cv": "下載履歷", "hero-tag": "智慧交通與物流管理", "hero-desc": "專注於智慧交通系統 (ITS) 與供應鏈管理優化，致力於將數據轉化為物流決策。", "btn-view-projects": "查看作品集" }
    };

    function applyLang(lang) {
        document.querySelectorAll('[data-key]').forEach(el => {
            const key = el.getAttribute('data-key');
            if (langData[lang][key]) el.innerText = langData[lang][key];
        });
        document.getElementById('btn-en').classList.toggle('lang-active', lang === 'en');
        document.getElementById('btn-zh').classList.toggle('lang-active', lang === 'zh');
    }

    function switchLang(lang) {
        localStorage.setItem('pref-lang', lang);
        applyLang(lang);
    }

    window.onload = () => {
        applyLang(localStorage.getItem('pref-lang') || 'en');
    };
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
