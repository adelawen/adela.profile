<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HsinYu | NCKU Transportation Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* 核心樣式設定 */
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .hero-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            background: linear-gradient(135deg, #ffffff 0%, #e9ecef 100%);
        }

        /* 這裡是修正你照片太大、路徑錯誤的關鍵 */
        .profile-photo {
            width: 320px;           /* 固定寬度 */
            height: 320px;          /* 固定高度 */
            object-fit: cover;      /* 自動裁切，防止壓扁 */
            border-radius: 50%;     /* 完美圓形 */
            border: 10px solid #fff; /* 白色質感邊框 */
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); /* 現代感陰影 */
            transition: all 0.4s ease;
        }

        .profile-photo:hover {
            transform: translateY(-10px); /* 移上去會往上飄一點 */
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .social-btn {
            width: 50px;
            height: 50px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin-right: 10px;
            transition: 0.3s;
            text-decoration: none;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

<section class="hero-section">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-lg-7 text-center text-lg-start">
                <h1 class="display-3 fw-bold mb-3">Hi, I'm <span class="text-primary">HsinYu</span></h1>
                <h2 class="h4 text-secondary mb-4">NCKU Transportation Management | ITS & Supply Chain</h2>
                <p class="lead text-muted mb-5">
                    專注於智慧交通系統 (ITS) 與供應鏈管理優化。透過 Vissim 模擬與數據分析，致力於提升物流效率與碳中和轉型。
                </p>
                
                <div class="mb-5">
                    <a href="https://www.linkedin.com/in/adelawen/" target="_blank" class="social-btn btn-outline-primary border">
                        <i class="fab fa-linkedin-in"></i>
                    </a>
                    <a href="https://github.com/adelawen/adela.profile" target="_blank" class="social-btn btn-outline-dark border">
                        <i class="fab fa-github"></i>
                    </a>
                </div>
                
                <a href="mailto:your-email@example.com" class="btn btn-primary btn-lg px-5 rounded-pill shadow">Contact Me</a>
            </div>
            
            <div class="col-lg-5 text-center mt-5 mt-lg-0">
                <div class="position-relative d-inline-block">
                    <img src="my-face.jpg" alt="HsinYu" class="img-fluid profile-photo">
                </div>
            </div>
        </div>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
