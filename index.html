<!DOCTYPE html>
<html lang="en">
<head>

    <title>HsinYu | Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-color: #007bff; }
        body { font-family: 'Inter', system-ui, sans-serif; }
        .navbar { background: white; border-bottom: 1px solid #eee; }

</head>
<body>

    <nav class="navbar navbar-expand-lg sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="index.html">HsinYu.</a>
            <div class="ms-auto d-flex align-items-center order-lg-last">
                <button class="btn btn-sm text-primary fw-bold" onclick="switchLang('en')">EN</button> | 
                <button class="btn btn-sm text-primary fw-bold" onclick="switchLang('zh')">中文</button>
            </div>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">

            <div class="collapse navbar-collapse" id="navbarNav">

                    <li class="nav-item"><a class="nav-link px-3" href="index.html">Home</a></li>

        function switchLang(lang) {

            location.reload();
