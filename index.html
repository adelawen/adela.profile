<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HsinYu | Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-color: #007bff; }
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; color: #333; overflow-x: hidden; }
        
        /* 導覽列修正：增加間距並防止重疊 */
        .navbar { background: rgba(255, 255, 255, 0.95); border-bottom: 1px solid #eee; backdrop-filter: blur(10px); }
        .nav-link { font-weight: 500; padding: 0.5rem 1rem !important; }
        .btn-resume { border-radius: 50px; font-weight: 600; padding: 8px 20px; white-space: nowrap; }

        /* 語言切換樣式優化 */
        .lang-wrapper { display: flex; align-items: center; gap: 8px; margin-left: 15px; }
        .lang-btn { 
            cursor: pointer; border: none; background: none; font-size: 0.9rem;
            font-weight: bold; color: var(--primary-color); padding: 5px; 
            text-decoration: none; transition: 0.2s;
        }
        .lang-btn:hover { opacity: 0.7; }

        /* Hero 區塊 */
        .hero-section { min-height: 90vh; display: flex; align-items: center; background: linear-gradient(135deg, #f8f9fa 0%, #eef2f7 100%); padding: 80px 0; }
        .profile-photo { width: 320px; height: 320px; object-fit: cover; border-radius: 50%; border: 8px solid #fff; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }

        @media (max-width: 991px) {
            .lang-wrapper { margin-left: 0; margin-top: 15px; justify-content: center; }
            .navbar-nav { text-align: center; }
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="index.html">HsinYu.</a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="index.html" data-key="nav-home">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="projects.html" data-key="nav-projects">Projects</a></li>
                    <li class="nav-item"><a class="nav-link" href="experience.html" data-key="nav-exp">Experience</a></li>
                    <li class="nav-item ms-lg-3">
                        <a href="resume.pdf" download class="btn btn-primary btn-resume shadow-sm" data-key="btn-cv">
                            <i class="fas fa-file-download me-2"></i>Download CV
                        </a>
                    </li>
                    <li class="nav-item">
                        <div class="lang-wrapper">
                            <button class="lang-btn" onclick="switchLang('en')">EN</button>
                            <span class="text-muted">|</span>
                            <button class="lang-btn" onclick="switchLang('zh')">中</button>
                        </div>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="hero-section">
        <div class="container">
            <div class="row align-items-center text-center text-lg-start">
                <div class="col-lg-7">
                    <h6 class="text-primary fw-bold text-uppercase mb-3" data-key="hero-tag">ITS & Logistics Management</h6>
                    <h1 class="display-3 fw-bold mb-4">Hi, I'm <span class="text-primary">HsinYu</span></h1>
                    <p class="lead text-secondary mb-5" data-key="hero-desc">Focusing on Intelligent Transportation Systems (ITS) and supply chain optimization. Turning complex data into sustainable logistics solutions.</p>
                    <div class="d-flex flex-wrap justify-content-center justify-content-lg-start gap-3">
                        <a href="projects.html" class="btn btn-dark btn-resume px-4" data-key="btn-view-projects">Explore Projects</a>
                        <a href="https://www.linkedin.com/in/adelawen/" target="_blank" class="btn btn-outline-dark btn-resume px-4">LinkedIn</a>
                    </div>
                </div>
                <div class="col-lg-5 text-center mt-5 mt-lg-0">
                    <img src="my-face.jpg" alt="Profile" class="profile-photo">
                </div>
            </div>
        </div>
    </header>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const langData = {
            en: { "nav-home": "Home", "nav-projects": "Projects", "nav-exp": "Experience", "btn-cv": "Download CV", "hero-tag": "ITS & Logistics Management", "hero-desc": "Focusing on Intelligent Transportation Systems (ITS) and supply chain optimization. Turning complex data into sustainable logistics solutions.", "btn-view-projects": "Explore Projects" },
            zh: { "nav-home": "首頁", "nav-projects": "專案作品", "nav-exp": "實習經歷", "btn-cv": "下載履歷", "hero-tag": "智慧交通與物流管理", "hero-desc": "專注於智慧交通系統 (ITS) 與供應鏈管理優化。具備 Vissim 模擬分析與 Python 自動化經驗，致力於永續物流發展。", "btn-view-projects": "查看作品" }
        };
        function switchLang(lang) {
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.getAttribute('data-key');
                el.innerText = langData[lang][key];
            });
            localStorage.setItem('pref-lang', lang);
        }
        window.onload = () => { switchLang(localStorage.getItem('pref-lang') || 'en'); };
    </script>
</body>
</html>
